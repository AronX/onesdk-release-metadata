name: Update OneSDK Mapping

on:
  workflow_dispatch:
    inputs:
      onesdk_version:
        description: 'OneSDK 版本号 (如 1.36.0)'
        required: true
        type: string
      channel:
        description: '渠道名称 (如 bilibili)'
        required: true
        type: string
      channel_version:
        description: '渠道版本号 (如 4.4.0)'
        required: true
        type: string
      zip_url:
        description: 'CDN 下载地址'
        required: true
        type: string
      md5:
        description: '文件 MD5 (可选)'
        required: false
        type: string
      release_date:
        description: '发布日期 (如 2026-04-08，留空则自动使用今天)'
        required: false
        type: string

jobs:
  update-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update versioned mapping files
        run: |
          ONESDK_VERSION=${{ github.event.inputs.onesdk_version }}
          CHANNEL=${{ github.event.inputs.channel }}
          CHANNEL_VERSION=${{ github.event.inputs.channel_version }}
          ZIP_URL=${{ github.event.inputs.zip_url }}
          MD5=${{ github.event.inputs.md5 }}
          RELEASE_DATE=${{ github.event.inputs.release_date }}
          INDEX_FILE="mappings/index.json"
          VERSION_DIR="mappings/versions"
          VERSION_FILE="${VERSION_DIR}/${ONESDK_VERSION}.json"
          VERSION_RELATIVE_FILE="versions/${ONESDK_VERSION}.json"

          if [ -z "$RELEASE_DATE" ]; then
            RELEASE_DATE=$(date +%Y-%m-%d)
          fi

          mkdir -p "${VERSION_DIR}"

          echo "更新内容:"
          echo "  OneSDK 版本: $ONESDK_VERSION"
          echo "  渠道: $CHANNEL"
          echo "  渠道版本: $CHANNEL_VERSION"
          echo "  发布日期: $RELEASE_DATE"
          echo "  ZIP URL: $ZIP_URL"
          echo "  MD5: $MD5"

          if [ ! -f "${INDEX_FILE}" ]; then
            printf '%s\n' \
              '{' \
              '  "$schema": "../schemas/index.schema.json",' \
              '  "versions": []' \
              '}' > "${INDEX_FILE}"
          fi

          if [ ! -f "${VERSION_FILE}" ]; then
            printf '%s\n' \
              '{' \
              '  "$schema": "../../schemas/version.schema.json",' \
              "  \"version\": \"${ONESDK_VERSION}\"," \
              "  \"release_date\": \"${RELEASE_DATE}\"," \
              '  "channels": {}' \
              '}' > "${VERSION_FILE}"
          fi

          if [ -z "$MD5" ]; then
            jq --arg version "$ONESDK_VERSION" \
               --arg date "$RELEASE_DATE" \
               --arg channel "$CHANNEL" \
               --arg channel_version "$CHANNEL_VERSION" \
               --arg zip_url "$ZIP_URL" \
               '
               .release_date = $date
               | .channels[$channel] = (
                   ((.channels[$channel] // []) | map(select(.version != $channel_version)))
                   + [
                       {
                         "version": $channel_version,
                         "zip_url": $zip_url,
                         "release_date": $date
                       }
                     ]
                 )
               ' "${VERSION_FILE}" > tmp.json && mv tmp.json "${VERSION_FILE}"
          else
            jq --arg version "$ONESDK_VERSION" \
               --arg date "$RELEASE_DATE" \
               --arg channel "$CHANNEL" \
               --arg channel_version "$CHANNEL_VERSION" \
               --arg zip_url "$ZIP_URL" \
               --arg md5 "$MD5" \
               '
               .release_date = $date
               | .channels[$channel] = (
                   ((.channels[$channel] // []) | map(select(.version != $channel_version)))
                   + [
                       {
                         "version": $channel_version,
                         "zip_url": $zip_url,
                         "md5": $md5,
                         "release_date": $date
                       }
                     ]
                 )
               ' "${VERSION_FILE}" > tmp.json && mv tmp.json "${VERSION_FILE}"
          fi

          jq --arg version "$ONESDK_VERSION" \
             --arg date "$RELEASE_DATE" \
             --arg file "$VERSION_RELATIVE_FILE" \
             '
             .versions |= (
               map(select(.version != $version))
               + [
                   {
                     "version": $version,
                     "release_date": $date,
                     "file": $file
                   }
                 ]
             )
             | .versions |= sort_by(.version)
             ' "${INDEX_FILE}" > tmp.json && mv tmp.json "${INDEX_FILE}"

          echo ""
          echo "更新后的 index.json:"
          cat "${INDEX_FILE}"

          echo ""
          echo "更新后的版本文件:"
          cat "${VERSION_FILE}"

      - name: Create PR or push directly
        run: |
          CHANNEL=${{ github.event.inputs.channel }}
          ONESDK_VERSION=${{ github.event.inputs.onesdk_version }}
          CHANNEL_VERSION=${{ github.event.inputs.channel_version }}

          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mappings/index.json mappings/versions
          git status

          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "没有需要提交的更改"
          else
            # 提交更改
            git commit -m "chore: add $CHANNEL $CHANNEL_VERSION mapping for OneSDK $ONESDK_VERSION"

            # 推送到远程
            git push
            echo "已推送更新"
          fi
